<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2, #ff6ec4);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
        }

        @keyframes gradientBG {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            height: 100vh;
            position: fixed;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding-top: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .sidebar h4 {
            text-align: center;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
            border-radius: 10px;
            margin: 5px 10px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        .sidebar i {
            margin-right: 10px;
        }

        /* Top Navbar */
        .topbar {
            margin-left: 240px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .topbar h5 {
            margin: 0;
        }

        /* Content */
        .content {
            margin-left: 240px;
            padding: 20px;
        }

        /* Cards */
        .card {
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* Buttons */
        .btn-custom {
            background: linear-gradient(45deg, #ff6ec4, #7873f5);
            border: none;
            color: white;
            border-radius: 20px;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff6ec4;
            border-radius: 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .topbar, .content {
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4><i class="fas fa-brain"></i> CareerAI</h4>

    <a href="/dashboard"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/resume"><i class="fas fa-file-upload"></i> Upload Resume</a>
    <a href="/jobs"><i class="fas fa-briefcase"></i> Jobs</a>
    <a href="/applications"><i class="fas fa-list"></i> Applications</a>
    <a href="/companies"><i class="fas fa-building"></i> Companies</a>
    <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Top Navbar -->
<div class="topbar">
    <h5>🚀 AI Resume Analyzer & Job Matcher</h5>
    <div>
        <span>Welcome, User 👋</span>
    </div>
</div>

<!-- Main Content -->
<div class="content">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
